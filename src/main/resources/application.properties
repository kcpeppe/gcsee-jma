# Quarkus HTTP
quarkus.http.port=8080

# Larger multipart bodies — GC logs can be big.
quarkus.http.limits.max-body-size=512M

# Session / upload scratch dir. Override with env GCSEEJMA_UPLOAD_DIR if needed.
gcsee-jma.upload-dir=${java.io.tmpdir}/gcsee-jma/uploads

# Log level
quarkus.log.level=INFO
